<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Katalog Biji Kopi - Kopi Yukopi</title>

    <!-- FONTS -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=BBH+Hegarty&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />

    <!-- FEATHER ICONS -->
    <script src="https://unpkg.com/feather-icons"></script>
    <!-- MY STYLE -->
    <link rel="stylesheet" href="css/style.css" />
    <style>
      .catalog-section {
        padding: 10rem 7% 1.4rem;
        background-color: var(--bg);
        min-height: 100vh;
      }
      .catalog-section h2 {
        text-align: center;
        font-size: 2.6rem;
        margin-bottom: 3rem;
        color: aliceblue;
      }
      .catalog-section h2 span {
        color: #355c7d;
      }
      .products {
        display: flex;
        flex-wrap: wrap;
        gap: 2rem;
        justify-content: center;
      }
      .product-card {
        background: #fff;
        padding: 2rem;
        border-radius: 1rem;
        text-align: center;
        width: 320px;
        box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        transition: transform 0.3s;
      }
      .product-card:hover {
        transform: translateY(-10px);
      }
      .product-card img {
        width: 100%;
        height: 220px;
        object-fit: cover;
        border-radius: 0.5rem;
        margin-bottom: 1.5rem;
      }
      .product-card h3 {
        color: #355c7d;
        font-size: 1.5rem;
        margin-bottom: 0.5rem;
      }
      .product-card .price {
        color: var(--primary);
        font-size: 1.3rem;
        font-weight: bold;
        margin-bottom: 1.5rem;
      }
      .product-card .btn {
        display: inline-block;
        padding: 0.8rem 2rem;
        background: var(--primary);
        color: #fff;
        border-radius: 0.5rem;
        cursor: pointer;
        transition: background 0.3s;
      }
      .product-card .btn:hover {
        background: #e0606e;
      }
    </style>
  </head>
  <body>
    <!-- NAVBAR START-->
    <nav class="navbar">
      <a href="index.html" class="navbar-logo">Ngopi ya di <span>YUKOPI</span></a>

      <div class="navbar-nav">
        <a href="index.html">Home</a>
        <a href="index.html#About">Tentang Kami</a>
        <a href="index.html#Menu">Menu</a>
        <a href="index.html#Contact">Kontak</a>
      </div>

      <div class="div navbar-extra">
        <a href="#" id="search"><i data-feather="search"></i></a>
        <a href="#" id="shopping-cart"><i data-feather="shopping-cart"></i></a>
        <a href="#" id="humberger-menu"><i data-feather="menu"></i></a>
      </div>
    </nav>
    <!-- NAVBAR END -->

    <!-- KATALOG START -->
    <section class="catalog-section">
      <h2><span>Biji Kopi </span>Pilihan</h2>
      <div class="products">
        <div class="product-card">
          <img src="img/header.jpg" alt="Arabica Gayo" />
          <h3>Arabica Gayo</h3>
          <p class="price">Rp 85.000</p>
          <a href="#" class="btn">Tambahkan</a>
        </div>
        <div class="product-card">
          <img src="img/header1.jpg" alt="Robusta Lampung" />
          <h3>Robusta Lampung</h3>
          <p class="price">Rp 65.000</p>
          <a href="#" class="btn">Tambahkan</a>
        </div>
        <div class="product-card">
          <img src="img/tentang kami 1 kecil.jpg" alt="House Blend Yukopi" />
          <h3>House Blend Yukopi</h3>
          <p class="price">Rp 75.000</p>
          <a href="#" class="btn">Tambahkan</a>
        </div>
      </div>
    </section>
    <!-- KATALOG END -->

    <!-- FEATHER ICONS -->
    <script>
      feather.replace();
    </script>
    <!-- MY JAVASCRIPT -->
    <script src="js/script.js"></script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Arcade Rock Paper Scissors</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="crt-overlay"></div>
    <div class="scanlines"></div>
    <div class="arcade-screen">
      <div class="header">
        <h1 class="logo">
          <div class="logo-line color-yellow">ROCK</div>
          <div class="logo-line color-cyan">PAPER</div>
          <div class="logo-line color-pink">SCISSORS</div>
        </h1>
      </div>

      <div class="score-board">
        <h2 class="rgb-text blink color-white">SCOREBOARD</h2>
        <div class="scores" id="score-display">
          <span class="color-purple"
            >1UP<br /><span id="player-score">0</span></span
          >
          <span
            class="color-red blink"
            style="align-self: flex-end; font-size: 1rem"
            >VS</span
          >
          <span class="color-cyan"
            >COMP<br /><span id="comp-score">0</span></span
          >
        </div>
      </div>

      <div class="game-area">
        <div id="status-message" class="color-green">AWAITING INPUT...</div>
        <div class="controls">
          <button class="arcade-btn color-yellow" onclick="playGame('Rock')">
            ROCK
          </button>
          <button class="arcade-btn color-cyan" onclick="playGame('Paper')">
            PAPER
          </button>
          <button class="arcade-btn color-pink" onclick="playGame('Scissors')">
            SCISSORS
          </button>
        </div>

        <div class="log-wrapper">
          <h3 class="color-white">MATCH HISTORY</h3>
          <div id="round-log" class="logs">
            <div
              class="log-entry color-purple blink"
              style="justify-content: center"
            >
              INSERT COIN TO PLAY
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="RockPaperScissor.js"></script>
  </body>
</html>

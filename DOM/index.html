<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rock paper scissor game</title>
  </head>
  <body>
    <h1>PLAY ROCK, PAPER, SCISSOR!</h1>

    <!-- BUTTON -->
    <button id="btn-rock">ROCK</button>
    <button id="btn-paper">PAPER</button>
    <button id="btn-scissor">SCISSOR</button>
    <!-- BUTTON END -->

    <!-- CHOICE -->
    <p>YOUR CHOICE :<span id="player-choice"></span></p>
    <p>COMPUTER CHOICE : <span id="computer-choice"></span></p>
    <!-- CHOICE END -->

    <!-- HASIL PER ROUND -->
    <p>RESULT :<span id="hasil-ronde"></span></p>
    <!-- HASIL PER ROUND END -->

    <!-- SCORE -->
    <p>SCORE : <span id="score-akhir">0</span></p>
    <!-- SCORE END -->

    <script src="script.js"></script>
  </body>
</html>
